<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body>
	<!--begin::Root flex layout-->
	<div class="d-flex flex-column flex-root" style="height: 100vh;">

		<!--begin::Header-->
		<div class="d-flex flex-column-auto">
			<div th:replace="~{fragments/header :: header-home}"></div>
		</div>
		<!--end::Header-->



		<!--begin::Content (fluid, scrollable)-->
		<div class="d-flex flex-column-fluid overflow-auto">
			<div class="p-4 w-100">
				<div class="card shadow-sm">
					<div class="card-body">
						<div class="d-flex gap-4">
							<!--표지 이미지-->
							<div class="flex-row-auto">
								<img src="https://picsum.photos/80/110" class="rounded"
									style="width: 80px; height: 110px; object-fit: cover;">
							</div>
							<div class="d-flex flex-column flex-row-fluid gap-2">

								<!--상단: 상태 뱃지 + 즐겨찾기-->
								<div class="d-flex justify-content-between align-items-center">
									<span class="badge badge-sm badge-primary">읽는 중</span> <i
										class="ki-duotone ki-heart fs-3 text-danger"> <span
										class="path1"></span> <span class="path2"></span>
									</i>
								</div>

								<!--제목-->
								<span class="fw-bold fs-5 text-gray-800 lh-sm">책 제목이
									들어갑니다</span>

								<!--저자 · 출판사-->
								<span class="fs-7 text-gray-500">홍길동 · 민음사</span>

								<!--카테고리-->
								<div>
									<span class="badge badge-light-info badge-sm">소설</span>
								</div>

								<!--별점-->
								<div class="d-flex align-items-center gap-1">
									<div class="rating">
										<div class="rating-label checked">
											<i class="ki-duotone ki-star fs-7"></i>
										</div>
										<div class="rating-label checked">
											<i class="ki-duotone ki-star fs-7"></i>
										</div>
										<div class="rating-label checked">
											<i class="ki-duotone ki-star fs-7"></i>
										</div>
										<div class="rating-label checked">
											<i class="ki-duotone ki-star fs-7"></i>
										</div>
										<div class="rating-label">
											<i class="ki-duotone ki-star fs-7"></i>
										</div>
									</div>
									<span class="fs-8 text-gray-500 ms-1">4.0</span>
								</div>
							</div>
						</div>
					</div>
					<div class="card-footer">
						<!--진행률-->
						<div>
							<div
								class="d-flex justify-content-between fs-9 text-gray-500 mb-1">
								<span>180/320p</span> <span>56%</span>
							</div>
							<div class="progress h-6px">
								<div class="progress-bar bg-primary" style="width: 56%"></div>
							</div>
						</div>
					</div>
				</div>

			</div>
		</div>
		<!--end::Content-->

		<!--begin::Bottom Navigation (fixed at bottom)-->
		<div class="d-flex flex-column-auto bg-white border-top w-100">
			<div
				class="d-flex flex-row justify-content-around align-items-center w-100 py-2">

				<!--홈-->
				<a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-home fs-2x text-gray-600"> <span
						class="path1"></span> <span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">홈</span>
				</a>

				<!--북마크-->
				<a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-bookmark fs-2x text-gray-600"> <span
						class="path1"></span> <span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">북마크</span>
				</a>

				<!--AI-->
				<a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-robot fs-2x text-gray-600"> <span
						class="path1"></span> <span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">AI</span>
				</a>

				<!--친구-->
				<a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-people fs-2x text-gray-600"> <span
						class="path1"></span> <span class="path2"></span> <span
						class="path3"></span> <span class="path4"></span> <span
						class="path5"></span>
				</i> <span class="fs-9 text-gray-600">친구</span>
				</a>

				<!--마이-->
				<a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-user fs-2x text-gray-600"> <span
						class="path1"></span> <span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">마이</span>
				</a>

			</div>
		</div>
		<!--end::Bottom Navigation-->

	</div>
	<!--end::Root flex layout-->

</body>
</html>
