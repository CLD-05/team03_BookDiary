<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>마이페이지</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
<style>
    html, body { height: 100%; overflow: hidden; }
    #scrollContainer { overflow-y: auto; -webkit-overflow-scrolling: touch; }
</style>
</head>

<body>
    <div class="d-flex flex-column" style="height: 100vh;">

        <!--헤더-->
        <div th:replace="~{fragments/header :: header-main}"></div>

        <!--콘텐츠-->
        <div id="scrollContainer" class="flex-grow-1" style="overflow-y: auto;">
            <div class="p-4 w-100 d-flex flex-column gap-4">

                <!--프로필 카드-->
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h3 class="card-title">My Profile</h3>
                    </div>
                    <div class="card-body">

                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">아이디</label>
                            <input type="text" id="userId" class="form-control form-control-lg bg-light" readonly>
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">이름</label>
                            <input type="text" id="name" class="form-control form-control-lg"
                                   placeholder="이름을 입력하세요">
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">이메일</label>
                            <input type="email" id="email" class="form-control form-control-lg"
                                   placeholder="이메일을 입력하세요">
                        </div>

                    </div>
                </div>

                <!--비밀번호 변경 카드-->
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h3 class="card-title">비밀번호 변경</h3>
                        <div class="card-toolbar">
                            <span class="badge badge-light-info badge-sm">선택</span>
                        </div>
                    </div>
                    <div class="card-body">

                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">
                                현재 비밀번호 <span class="text-danger">*</span>
                            </label>
                            <input type="password" id="currentPass" class="form-control form-control-lg"
                                   placeholder="수정 시 본인 확인을 위해 입력하세요">
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">새 비밀번호</label>
                            <input type="password" id="newPass" class="form-control form-control-lg"
                                   placeholder="변경할 경우에만 입력">
                        </div>

                    </div>
                </div>

                <!--수정 버튼-->
                <button type="button" onclick="updateProfile()"
                        class="btn btn-primary w-100 btn-lg">
                    정보 수정하기
                </button>

                <!--회원탈퇴-->
                <div class="text-center">
                    <button type="button" onclick="handleWithdraw()"
                            class="btn btn-sm btn-light-danger">
                        회원 탈퇴
                    </button>
                </div>

            </div>
        </div>

        <!--네비-->
        <div th:replace="~{fragments/navbar :: navbar-main('mypage')}"></div>

    </div>

    <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
    <script th:src="@{/js/scripts.bundle.js}"></script>

    <script>
    function getToken() {
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
            const [key, val] = c.trim().split('=');
            if (key === 'token') return val;
        }
        return null;
    }

    document.addEventListener('DOMContentLoaded', function() {
        const token = getToken();
        if (!token) {
            location.href = '/publishing/login';
            return;
        }
        fetchProfile();
    });

    function fetchProfile() {
        fetch('/api/users/me', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        })
        .then(res => res.json())
        .then(res => {
            if (res.result) {
                document.getElementById('userId').value = res.data.userId;
                document.getElementById('name').value = res.data.name;
                document.getElementById('email').value = res.data.email || '';
            } else {
                Swal.fire({
                    text: "로그인이 만료되었습니다.",
                    icon: "warning",
                    buttonsStyling: false,
                    confirmButtonText: "로그인하기",
                    customClass: { confirmButton: "btn btn-primary" }
                }).then(() => location.href = '/publishing/login');
            }
        });
    }

    function updateProfile() {
        const currentPass = document.getElementById('currentPass').value;

        if (!currentPass) {
            Swal.fire({
                text: "현재 비밀번호를 입력해야 정보를 수정할 수 있습니다.",
                icon: "warning",
                buttonsStyling: false,
                confirmButtonText: "확인",
                customClass: { confirmButton: "btn btn-primary" }
            });
            return;
        }

        fetch('/api/users/me', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + getToken()
            },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                currentPass: currentPass,
                newPass: document.getElementById('newPass').value
            })
        })
        .then(res => res.json())
        .then(res => {
            if (res.result) {
                Swal.fire({
                    text: "정보가 성공적으로 수정되었습니다.",
                    icon: "success",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-primary" }
                }).then(() => location.reload());
            } else {
                Swal.fire({
                    text: res.message,
                    icon: "error",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-danger" }
                });
            }
        });
    }

    function handleWithdraw() {
        Swal.fire({
            text: "정말 탈퇴하시겠습니까? 모든 데이터가 삭제됩니다.",
            icon: "warning",
            buttonsStyling: false,
            showCancelButton: true,
            confirmButtonText: "탈퇴하기",
            cancelButtonText: "취소",
            customClass: {
                confirmButton: "btn btn-danger",
                cancelButton: "btn btn-light"
            }
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/api/users/me', {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                })
                .then(res => res.json())
                .then(res => {
                    if (res.result) {
                        document.cookie = 'token=; max-age=0; path=/';
                        Swal.fire({
                            text: "탈퇴가 완료되었습니다.",
                            icon: "success",
                            buttonsStyling: false,
                            confirmButtonText: "확인",
                            customClass: { confirmButton: "btn btn-primary" }
                        }).then(() => location.href = '/publishing/login');
                    }
                });
            }
        });
    }
    </script>

</body>
</html>
