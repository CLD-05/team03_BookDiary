<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>마이페이지</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body>
    <div class="d-flex flex-column flex-root" style="height: 100vh;">

        <!--헤더-->
        <div class="d-flex flex-column-auto">
            <div th:replace="~{fragments/header :: header-home}"></div>
        </div>

        <!--콘텐츠-->
        <div class="d-flex flex-column-fluid overflow-auto">
            <div class="p-4 w-100">

                <!--프로필 카드-->
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        <h3 class="card-title">My Profile</h3>
                    </div>
                    <div class="card-body">

                        <!--아이디-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">아이디</label>
                            <input type="text" id="userId" class="form-control form-control-lg bg-light"
                                   readonly>
                        </div>

                        <!--이름-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">이름</label>
                            <input type="text" id="name" class="form-control form-control-lg"
                                   placeholder="이름을 입력하세요">
                        </div>

                        <!--이메일-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">이메일</label>
                            <input type="email" id="email" class="form-control form-control-lg"
                                   placeholder="이메일을 입력하세요">
                        </div>

                    </div>
                </div>

                <!--비밀번호 변경 카드-->
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        <h3 class="card-title">비밀번호 변경</h3>
                        <div class="card-toolbar">
                            <span class="badge badge-light-info badge-sm">선택</span>
                        </div>
                    </div>
                    <div class="card-body">

                        <!--현재 비밀번호-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">
                                현재 비밀번호 <span class="text-danger">*</span>
                            </label>
                            <input type="password" id="currentPass" class="form-control form-control-lg"
                                   placeholder="수정 시 본인 확인을 위해 입력하세요">
                        </div>

                        <!--새 비밀번호-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">새 비밀번호</label>
                            <input type="password" id="newPass" class="form-control form-control-lg"
                                   placeholder="변경할 경우에만 입력">
                        </div>

                    </div>
                </div>

                <!--수정 버튼-->
                <button type="button" onclick="updateProfile()"
                        class="btn btn-primary w-100 btn-lg mb-4">
                    정보 수정하기
                </button>

                <!--회원탈퇴-->
                <div class="text-center">
                    <button type="button" onclick="handleWithdraw()"
                            class="btn btn-sm btn-light-danger">
                        회원 탈퇴
                    </button>
                </div>

            </div>
        </div>

        <!--하단 네비-->
        <div class="d-flex flex-column-auto bg-white border-top w-100">
            <div class="d-flex flex-row justify-content-around align-items-center w-100 py-2">

                <a href="/publishing/index"
                   class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
                    <i class="ki-duotone ki-home fs-2x text-gray-600">
                        <span class="path1"></span><span class="path2"></span>
                    </i>
                    <span class="fs-9 text-gray-600">홈</span>
                </a>

                <a href="#"
                   class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
                    <i class="ki-duotone ki-bookmark fs-2x text-gray-600">
                        <span class="path1"></span><span class="path2"></span>
                    </i>
                    <span class="fs-9 text-gray-600">북마크</span>
                </a>

                <a href="#"
                   class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
                    <i class="ki-duotone ki-robot fs-2x text-gray-600">
                        <span class="path1"></span><span class="path2"></span>
                    </i>
                    <span class="fs-9 text-gray-600">AI</span>
                </a>

                <a href="#"
                   class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
                    <i class="ki-duotone ki-people fs-2x text-gray-600">
                        <span class="path1"></span><span class="path2"></span>
                        <span class="path3"></span><span class="path4"></span><span class="path5"></span>
                    </i>
                    <span class="fs-9 text-gray-600">친구</span>
                </a>

                <a href="#"
                   class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none active">
                    <i class="ki-duotone ki-user fs-2x text-primary">
                        <span class="path1"></span><span class="path2"></span>
                    </i>
                    <span class="fs-9 text-primary fw-semibold">마이</span>
                </a>

            </div>
        </div>

    </div>

    <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
    <script th:src="@{/js/scripts.bundle.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetchProfile();
        });

        function fetchProfile() {
            const token = localStorage.getItem('token');
            if (!token) {
                Swal.fire({
                    text: "로그인이 필요한 서비스입니다.",
                    icon: "warning",
                    buttonsStyling: false,
                    confirmButtonText: "로그인하기",
                    customClass: { confirmButton: "btn btn-primary" }
                }).then(() => {
                    location.href = '/auth/login';
                });
                return;
            }

            fetch('/api/users/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    document.getElementById('userId').value = res.data.userId;
                    document.getElementById('name').value = res.data.name;
                    document.getElementById('email').value = res.data.email || '';
                } else {
                    Swal.fire({
                        text: "로그인이 만료되었습니다. 다시 로그인해주세요.",
                        icon: "warning",
                        buttonsStyling: false,
                        confirmButtonText: "로그인하기",
                        customClass: { confirmButton: "btn btn-primary" }
                    }).then(() => {
                        location.href = '/auth/login';
                    });
                }
            });
        }

        function updateProfile() {
            const token = localStorage.getItem('token');
            const currentPass = document.getElementById('currentPass').value;

            if (!currentPass) {
                Swal.fire({
                    text: "현재 비밀번호를 입력해야 정보를 수정할 수 있습니다.",
                    icon: "warning",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-primary" }
                });
                return;
            }

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                currentPass: currentPass,
                newPass: document.getElementById('newPass').value
            };

            fetch('/api/users/me', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    Swal.fire({
                        text: "정보가 성공적으로 수정되었습니다.",
                        icon: "success",
                        buttonsStyling: false,
                        confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-primary" }
                    }).then(() => {
                        location.reload();
                    });
                } else {
                    Swal.fire({
                        text: res.message,
                        icon: "error",
                        buttonsStyling: false,
                        confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-danger" }
                    });
                }
            });
        }

        function handleWithdraw() {
            Swal.fire({
                text: "정말 탈퇴하시겠습니까? 모든 데이터가 삭제됩니다.",
                icon: "warning",
                buttonsStyling: false,
                showCancelButton: true,
                confirmButtonText: "탈퇴하기",
                cancelButtonText: "취소",
                customClass: {
                    confirmButton: "btn btn-danger",
                    cancelButton: "btn btn-light"
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const token = localStorage.getItem('token');
                    fetch('/api/users/me', {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.result) {
                            localStorage.removeItem('token');
                            Swal.fire({
                                text: "탈퇴가 완료되었습니다.",
                                icon: "success",
                                buttonsStyling: false,
                                confirmButtonText: "확인",
                                customClass: { confirmButton: "btn btn-primary" }
                            }).then(() => {
                                location.href = '/auth/login';
                            });
                        }
                    });
                }
            });
        }
    </script>

</body>
</html>
