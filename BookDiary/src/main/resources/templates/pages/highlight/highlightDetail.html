<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>하이라이트 상세</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body>
    <div class="d-flex flex-column flex-root" style="height: 100vh;">

        <div th:replace="~{fragments/header :: header-back('하이라이트')}"></div>

        <div class="d-flex flex-column-fluid overflow-auto">
            <div class="p-4 w-100 d-flex flex-column gap-4">

                <!--책 정보-->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex gap-3 align-items-center">
                            <img id="bookImage" src="" class="rounded"
                                 style="width: 50px; height: 70px; object-fit: cover;">
                            <div class="d-flex flex-column gap-1">
                                <span id="bookTitle" class="fw-bold fs-6 text-gray-800"></span>
                                <span id="bookAuthor" class="fs-7 text-gray-500"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!--대사-->
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h3 class="card-title fs-6">💬 대사</h3>
                        <div class="card-toolbar">
                            <span id="pageNumber" class="fs-8 text-gray-400"></span>
                        </div>
                    </div>
                    <div class="card-body">
                        <p id="highlightText" class="fs-5 text-gray-800 lh-lg mb-0"></p>
                    </div>
                </div>

                <!--날짜-->
                <div class="card shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <span class="fs-7 text-gray-500">저장일</span>
                        <span id="createDate" class="fs-7 fw-semibold text-gray-800"></span>
                    </div>
                </div>

                <!--수정 버튼-->
                <button type="button" id="editBtn"
                        class="btn btn-light-primary w-100">
                    <i class="ki-duotone ki-pencil fs-4">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                    수정하기
                </button>

                <!--삭제 버튼-->
                <button type="button" onclick="handleDelete()"
                        class="btn btn-light-danger w-100">
                    <i class="ki-duotone ki-trash fs-4">
                        <span class="path1"></span>
                        <span class="path2"></span>
                        <span class="path3"></span>
                        <span class="path4"></span>
                        <span class="path5"></span>
                    </i>
                    삭제하기
                </button>

            </div>
        </div>

    </div>

    <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
    <script th:src="@{/js/scripts.bundle.js}"></script>

    <script>
        const highlightId = new URLSearchParams(location.search).get('highlightId');

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                const [key, val] = c.trim().split('=');
                if (key === 'token') return val;
            }
            return null;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = getToken();
            if (!token) {
                location.href = '/publishing/login';
                return;
            }

            fetch(`/api/highlights/${highlightId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(res => {
                if (!res.result) {
                    history.back();
                    return;
                }

                const h = res.data;
                document.getElementById('bookImage').src = h.bookImageUrl || 'https://picsum.photos/50/70';
                document.getElementById('bookTitle').textContent = h.bookTitle || '';
                document.getElementById('bookAuthor').textContent = h.bookAuthor || '';
                document.getElementById('highlightText').textContent = `"${h.highlightText}"`;
                document.getElementById('pageNumber').textContent = h.pageNumber ? `p. ${h.pageNumber}` : '';
                document.getElementById('createDate').textContent = h.createDate?.substring(0, 10) || '';
                document.getElementById('editBtn').onclick = () =>
                    location.href = `/highlight/edit?highlightId=${highlightId}`;
            });
        });

        function handleDelete() {
            Swal.fire({
                text: "정말 삭제하시겠습니까?",
                icon: "warning",
                buttonsStyling: false,
                showCancelButton: true,
                confirmButtonText: "삭제",
                cancelButtonText: "취소",
                customClass: {
                    confirmButton: "btn btn-danger",
                    cancelButton: "btn btn-light"
                }
            }).then(result => {
                if (result.isConfirmed) {
                    fetch(`/api/highlights/${highlightId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + getToken() }
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.result) {
                            Swal.fire({
                                text: "삭제되었습니다.",
                                icon: "success",
                                buttonsStyling: false,
                                confirmButtonText: "확인",
                                customClass: { confirmButton: "btn btn-primary" }
                            }).then(() => {
                                location.href = '/highlight/highlight';
                            });
                        }
                    });
                }
            });
        }
    </script>

</body>
</html>
