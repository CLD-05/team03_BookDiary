<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('로그인')}"></head>
<body>

<div th:replace="~{fragments/header :: header('로그인')}"></div>

<div class="page-wrap">
    <div class="container">
        <form id="loginForm" class="mt-lg">
            <div class="card-lg">
                <div class="card-label">Welcome Back</div>

                <div class="form-group">
                    <label class="form-label">아이디</label>
                    <input type="text" id="userId" name="userId" class="form-input" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" id="pass" name="pass" class="form-input" placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="button" onclick="handleLogin()" class="btn btn-primary btn-full mt-md">로그인</button>

                <div class="flex-center mt-md">
                    <span class="text-hint text-sm">계정이 없으신가요?</span>
                    <button type="button" class="btn btn-ghost btn-sm" onclick="location.href='/auth/signup'">회원가입</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    /**
     * 로그인 처리 함수
     * 서버의 UserService에서 던지는 구체적인 에러 메시지를 alert으로 보여줍니다.
     */
    function handleLogin() {
        const userIdField = document.getElementById('userId');
        const passField = document.getElementById('pass');

        const data = {
            userId: userIdField.value,
            pass: passField.value
        };

        // 유효성 검사
        if (!data.userId || !data.pass) {
            alert("아이디와 비밀번호를 모두 입력해주세요.");
            return;
        }

        fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    // 로그인 성공: 토큰 저장 후 홈으로 이동
                    localStorage.setItem('token', res.data);
                    location.href = '/';
                } else {
                    // 로그인 실패: UserService에서 설정한 구체적인 메시지 출력
                    // 예: "존재하지 않는 아이디입니다." 또는 "비밀번호가 일치하지 않습니다."
                    alert(res.message);

                    // 편의 기능: 비밀번호 필드만 비우고 포커스
                    passField.value = '';
                    passField.focus();
                }
            })
            .catch(err => {
                console.error('Login Error:', err);
                alert("서버와 통신 중 오류가 발생했습니다.");
            });
    }

    // 엔터 키 지원 (비밀번호 입력 후 엔터 누르면 로그인 실행)
    document.getElementById('pass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });
</script>

</body>
</html>
