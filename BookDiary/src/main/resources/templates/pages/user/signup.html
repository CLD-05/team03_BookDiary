<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body class="bg-body">

    <div class="d-flex flex-column flex-root" style="height: 100vh;">
        <div class="d-flex flex-column flex-column-fluid flex-center py-10">

            <div class="w-100 px-6" style="max-width: 400px;">

                <!--타이틀-->
                <div class="text-center mb-10">
                    <h1 class="fw-bolder fs-2x text-gray-900 mb-2">BookDiary 가입하기</h1>
                    <span class="fs-6 text-gray-500">나만의 독서 일기를 시작해보세요</span>
                </div>

                <!--회원가입 카드-->
                <div class="card shadow-sm">
                    <div class="card-body p-8">

                        <!--아이디-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">아이디 <span class="text-danger">*</span></label>
                            <input type="text" id="userId" class="form-control form-control-lg"
                                   placeholder="사용할 아이디를 입력하세요">
                        </div>

                        <!--비밀번호-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">비밀번호 <span class="text-danger">*</span></label>
                            <input type="password" id="pass" class="form-control form-control-lg"
                                   placeholder="비밀번호를 입력하세요">
                        </div>

                        <!--이름-->
                        <div class="mb-5">
                            <label class="form-label fw-semibold text-gray-700">이름 <span class="text-danger">*</span></label>
                            <input type="text" id="name" class="form-control form-control-lg"
                                   placeholder="이름을 입력하세요">
                        </div>

                        <!--이메일-->
                        <div class="mb-8">
                            <label class="form-label fw-semibold text-gray-700">이메일</label>
                            <input type="email" id="email" class="form-control form-control-lg"
                                   placeholder="example@mail.com">
                        </div>

                        <!--가입 버튼-->
                        <button type="button" onclick="handleSignup()"
                                class="btn btn-primary w-100 btn-lg mb-5">
                            가입 완료
                        </button>

                        <!--로그인 링크-->
                        <div class="text-center">
                            <span class="fs-7 text-gray-500">이미 계정이 있으신가요?</span>
                            <a href="/auth/login" class="fs-7 fw-semibold ms-1">로그인</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
    <script th:src="@{/js/scripts.bundle.js}"></script>

    <script>
        function handleSignup() {
            const data = {
                userId: document.getElementById('userId').value,
                pass: document.getElementById('pass').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };

            if (!data.userId || !data.pass || !data.name) {
                Swal.fire({
                    text: "아이디, 비밀번호, 이름은 필수 입력 항목입니다.",
                    icon: "warning",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-primary" }
                });
                return;
            }

            fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    Swal.fire({
                        text: "회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.",
                        icon: "success",
                        buttonsStyling: false,
                        confirmButtonText: "로그인하기",
                        customClass: { confirmButton: "btn btn-primary" }
                    }).then(() => {
                        location.href = '/auth/login';
                    });
                } else {
                    Swal.fire({
                        text: res.message,
                        icon: "error",
                        buttonsStyling: false,
                        confirmButtonText: "다시 시도",
                        customClass: { confirmButton: "btn btn-danger" }
                    });
                }
            })
            .catch(err => {
                console.error(err);
                Swal.fire({
                    text: "서버 통신 중 오류가 발생했습니다.",
                    icon: "error",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-danger" }
                });
            });
        }
    </script>

</body>
</html>
