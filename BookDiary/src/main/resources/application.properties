server.port=8080

#DB

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/bookdiary?serverTimezone=Asia/Seoul
spring.datasource.username=bookdiary
spring.datasource.password=1234

#JPA

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
# ?? ?? ??? ??
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

#Thymeleaf

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

#Batch ????

spring.batch.job.enabled=false

#Gemini ???? (API ? ?? ???)

spring.ai.google.genai.chat.enabled=false

#JWT

jwt.secret=bookdiary-secret-key-bookdiary-secret-key
jwt.expiration=86400000