<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>홈</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body>
	<div class="d-flex flex-column flex-root" style="height: 100vh;">

		<!--begin::Header-->
		<div class="d-flex flex-column-auto bg-white border-bottom px-4 py-3">
			<div class="d-flex justify-content-between align-items-center w-100">
				<span class="fw-bolder fs-3 text-gray-900">📚 BookDiary</span>
				<div class="d-flex align-items-center gap-2">
					<button class="btn btn-sm btn-icon btn-light">
						<i class="ki-duotone ki-notification fs-3"> <span
							class="path1"></span> <span class="path2"></span> <span
							class="path3"></span>
						</i>
					</button>
					<button class="btn btn-sm btn-icon btn-light"
						onclick="location.href='/publishing/mypage'">
						<i class="ki-duotone ki-user fs-3"> <span class="path1"></span>
							<span class="path2"></span>
						</i>
					</button>
				</div>
			</div>
		</div>
		<!--end::Header-->

		<!--begin::Content-->
		<div class="d-flex flex-column-fluid overflow-auto">
			<div class="p-4 w-100 d-flex flex-column gap-3">

				<!--읽은 책 없을 때-->
				<div th:if="${#lists.isEmpty(diaryList)}"
					class="d-flex flex-column align-items-center justify-content-center h-100 gap-3 py-20">
					<i class="ki-duotone ki-book fs-5x text-gray-300"> <span
						class="path1"></span> <span class="path2"></span>
					</i> <span class="fs-5 fw-semibold text-gray-500">아직 읽은 책이 없어요</span> <span
						class="fs-7 text-gray-400">오른쪽 아래 버튼을 눌러 책을 추가해보세요!</span>
				</div>

				<!--읽은 책 리스트-->
				<!--읽은 책 리스트-->
				<div th:each="diary : ${diaryList}" class="card shadow-sm">
					<div class="card-body">
						<div class="d-flex gap-4">

							<!--표지 이미지-->
							<div class="flex-row-auto">
								<img th:src="${diary.imageUrl}" class="rounded"
									style="width: 80px; height: 110px; object-fit: cover;"
									onerror="this.src='https://picsum.photos/80/110'">
							</div>

							<div class="d-flex flex-column flex-row-fluid gap-2">

								<!--상태 뱃지 + 즐겨찾기-->
								<div class="d-flex justify-content-between align-items-center">
									<span class="badge badge-sm"
										th:classappend="${diary.status.name() == 'READING'} ? 'badge-light-primary' :
                                         (${diary.status.name() == 'DONE'} ? 'badge-light-success' : 'badge-light-secondary')"
										th:text="${diary.status.name() == 'READING'} ? '📖 읽는 중' :
                                   (${diary.status.name() == 'DONE'} ? '✅ 완독' : '🔖 읽고 싶어요')">
									</span> <i class="ki-duotone ki-heart fs-3"
										th:classappend="${diary.favorite} ? 'text-danger' : 'text-gray-300'">
										<span class="path1"></span> <span class="path2"></span>
									</i>
								</div>

								<!--제목-->
								<span class="fw-bold fs-5 text-gray-800 lh-sm"
									th:text="${diary.title}"></span>

								<!--저자 · 출판사-->
								<span class="fs-7 text-gray-500"> <span
									th:text="${diary.author}"></span> <span
									th:if="${diary.publisher != null}"> · <span
										th:text="${diary.publisher}"></span>
								</span>
								</span>

								<!--카테고리-->
								<div th:if="${diary.category != null}">
									<span class="badge badge-light-info badge-sm"
										th:text="${diary.category}"></span>
								</div>

								<!--별점-->
								<div th:if="${diary.rating != null}"
									class="d-flex align-items-center gap-1">
									<div class="rating">
										<div th:each="i : ${#numbers.sequence(1, 5)}"
											class="rating-label"
											th:classappend="${i <= diary.rating} ? 'checked' : ''">
											<i class="ki-duotone ki-star fs-7"></i>
										</div>
									</div>
									<span class="fs-8 text-gray-500 ms-1" th:text="${diary.rating}"></span>
								</div>

							</div>
						</div>
					</div>
				</div>
				<!--end::card-->

			</div>
		</div>
		<!--end::Content-->

		<!--begin::Bottom Navigation-->
		<div class="d-flex flex-column-auto bg-white border-top w-100">
			<div
				class="d-flex flex-row justify-content-around align-items-center w-100 py-2">

				<a href="/publishing/index"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-home fs-2x text-primary"> <span
						class="path1"></span><span class="path2"></span>
				</i> <span class="fs-9 text-primary fw-semibold">홈</span>
				</a> <a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-bookmark fs-2x text-gray-600"> <span
						class="path1"></span><span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">북마크</span>
				</a> <a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-robot fs-2x text-gray-600"> <span
						class="path1"></span><span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">AI</span>
				</a> <a href="#"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-people fs-2x text-gray-600"> <span
						class="path1"></span><span class="path2"></span> <span
						class="path3"></span><span class="path4"></span><span
						class="path5"></span>
				</i> <span class="fs-9 text-gray-600">친구</span>
				</a> <a href="/publishing/mypage"
					class="d-flex flex-column align-items-center gap-1 px-3 text-decoration-none">
					<i class="ki-duotone ki-user fs-2x text-gray-600"> <span
						class="path1"></span><span class="path2"></span>
				</i> <span class="fs-9 text-gray-600">마이</span>
				</a>

			</div>
		</div>
		<!--end::Bottom Navigation-->

	</div>

	<!--플러스 버튼 (책 추가)-->
	<a href="/publishing/book-search"
		class="btn btn-primary btn-icon w-50px h-50px rounded-circle shadow-lg position-fixed"
		style="bottom: 80px; right: 20px; z-index: 999;"> <i
		class="ki-duotone ki-plus fs-2x"> <span class="path1"></span>
	</i>
	</a>

	<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
	<script th:src="@{/js/scripts.bundle.js}"></script>

	<script>
	    // 쿠키에서 토큰 꺼내는 함수
	    function getToken() {
	        const cookies = document.cookie.split(';');
	        for (let c of cookies) {
	            const [key, val] = c.trim().split('=');
	            if (key === 'token') return val;
	        }
	        return null;
	    }
	
	    // 토큰 없으면 로그인으로
	    if (!getToken()) {
	        location.href = '/publishing/login';
	    }
	</script>

</body>
</html>
