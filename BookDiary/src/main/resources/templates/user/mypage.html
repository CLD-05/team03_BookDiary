<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('마이페이지')}"></head>
<body>
<div th:replace="~{fragments/header :: header('마이페이지')}"></div>

<div class="page-wrap">
    <div class="container">

        <div class="card-lg mt-md">
            <div class="card-label">My Profile</div>

            <div class="form-group">
                <label class="form-label">아이디</label>
                <input type="text" id="userId" class="form-input" readonly style="background: var(--color-bg);">
            </div>

            <div class="form-group">
                <label class="form-label">이름</label>
                <input type="text" id="name" class="form-input" placeholder="이름을 입력하세요">
            </div>

            <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" id="email" class="form-input" placeholder="이메일을 입력하세요">
            </div>

            <hr class="divider">
            <div class="card-label">비밀번호 변경 (선택)</div>

            <div class="form-group">
                <label class="form-label">현재 비밀번호 <span class="text-danger">*</span></label>
                <input type="password" id="currentPass" class="form-input" placeholder="수정 시 본인 확인을 위해 입력하세요">
            </div>

            <div class="form-group">
                <label class="form-label">새 비밀번호</label>
                <input type="password" id="newPass" class="form-input" placeholder="변경할 경우에만 입력">
            </div>

            <button onclick="updateProfile()" class="btn btn-primary btn-full mt-md">정보 수정하기</button>
        </div>

    </div>
</div>

<div th:replace="~{fragments/navbar :: navbar('mypage')}"></div>

<script>
    // 페이지 로드 시 정보 조회
    document.addEventListener('DOMContentLoaded', function() {
        fetchProfile();
    });

    function fetchProfile() {
        const token = localStorage.getItem('token');

        // 토큰이 없으면 서버에 묻지도 않고 로그인창으로 보냄
        if (!token) {
            alert('로그인이 필요한 서비스입니다.');
            location.href = '/auth/login';
            return;
        }

        fetch('/api/user/profile', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    document.getElementById('userId').value = res.data.userId;
                    document.getElementById('name').value = res.data.name;
                    document.getElementById('email').value = res.data.email || '';
                } else {
                    alert('로그인이 만료되었습니다. 다시 로그인해주세요.');
                    location.href = '/auth/login';
                }
            });
    }

    function updateProfile() {
        const token = localStorage.getItem('token');
        const currentPass = document.getElementById('currentPass').value;

        if (!currentPass) {
            alert('현재 비밀번호를 입력해야 정보를 수정할 수 있습니다.');
            return;
        }

        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            currentPass: currentPass,
            newPass: document.getElementById('newPass').value
        };

        fetch('/api/user/profile', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(data)
        })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    alert('정보가 성공적으로 수정되었습니다.');
                    location.reload();
                } else {
                    alert(res.message);
                }
            });
    }
</script>
</body>
</html>
