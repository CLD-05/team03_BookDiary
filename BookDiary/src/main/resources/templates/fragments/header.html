<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- 뒤로가기 버튼 있는 헤더 -->
<header th:fragment="header(title)">
  <div class="header">
    <button class="header-back" onclick="history.back()">←</button>
    <span class="header-title" th:text="${title}">BookDiary</span>
    <span style="min-width:36px"></span>
  </div>
</header>

<!-- 오른쪽 액션 버튼 있는 헤더 -->
<header th:fragment="header-action(title, actionLabel, actionUrl)">
  <div class="header">
    <button class="header-back" onclick="history.back()">←</button>
    <span class="header-title" th:text="${title}">BookDiary</span>
    <a class="header-action" th:href="${actionUrl}" th:text="${actionLabel}">저장</a>
  </div>
</header>

<!-- 로고 헤더 (홈용) -->
<header th:fragment="header-home">
  <div class="header">
    <span style="min-width:36px"></span>
    <span class="header-title">📚 BookDiary</span>
    <span style="min-width:36px"></span>
  </div>
</header>

</html>
