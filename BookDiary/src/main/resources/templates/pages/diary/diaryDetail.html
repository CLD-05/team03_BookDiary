<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>다이어리 상세</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body>
	<div class="d-flex flex-column flex-root" style="height: 100vh;">

		<!--begin::Header-->
		<div th:replace="~{fragments/header :: header-back('독서 기록')}"></div>
		<!--end::Header-->

		<!--begin::Content-->
		<div class="d-flex flex-column-fluid overflow-auto">
			<div class="p-4 w-100 d-flex flex-column gap-4">

				<!--책 정보 카드-->
				<div class="card shadow-sm">
					<div class="card-body">
						<div class="d-flex gap-4">

							<!--표지-->
							<div class="flex-row-auto">
								<img id="bookImage" src="https://picsum.photos/80/110"
									class="rounded"
									style="width: 80px; height: 110px; object-fit: cover;">
							</div>

							<div class="d-flex flex-column flex-row-fluid gap-2">

								<!--상태 뱃지-->
								<div>
									<span id="statusBadge"
										class="badge badge-sm badge-light-primary">📖 읽는 중</span>
								</div>

								<!--제목-->
								<span id="bookTitle" class="fw-bold fs-5 text-gray-800 lh-sm">책
									제목</span>

								<!--저자 · 출판사-->
								<span id="bookAuthor" class="fs-7 text-gray-500">저자 · 출판사</span>
							</div>
						</div>
					</div>
				</div>

				<!--독서 기간 카드-->
				<div class="card shadow-sm">
					<div class="card-header">
						<h3 class="card-title fs-6">📅 독서 기간</h3>
					</div>
					<div class="card-body py-3">
						<div class="d-flex justify-content-between align-items-center">
							<span class="fs-7 text-gray-500">시작일</span> <span id="startDate"
								class="fs-7 fw-semibold text-gray-800">-</span>
						</div>
						<div class="separator my-2"></div>
						<div class="d-flex justify-content-between align-items-center">
							<span class="fs-7 text-gray-500">완료일</span> <span id="endDate"
								class="fs-7 fw-semibold text-gray-800">-</span>
						</div>
					</div>
				</div>

				<!--별점 카드-->
				<div class="card shadow-sm">
					<div class="card-header">
						<h3 class="card-title fs-6">⭐ 별점</h3>
					</div>
					<div class="card-body py-3">
						<div class="d-flex align-items-center gap-2">
							<div class="rating" id="ratingStars"></div>
							<span id="ratingText" class="fs-6 fw-semibold text-gray-700"></span>
						</div>
					</div>
				</div>

				<!--메모 카드-->
				<div class="card shadow-sm" id="memoCard">
					<div class="card-header">
						<h3 class="card-title fs-6">📝 메모</h3>
					</div>
					<div class="card-body">
						<p id="memoTitle" class="fw-bold fs-6 text-gray-800 mb-2"></p>
						<p id="memoContent" class="fs-7 text-gray-600 mb-0"></p>
					</div>
				</div>

				<!--하이라이트-->
				<div class="card shadow-sm">
					<div class="card-header">
						<h3 class="card-title fs-6">💬 기억하고 싶은 대사</h3>
						<div class="card-toolbar">
							<a id="highlightLink" href="#" class="btn btn-sm btn-light">
								전체보기 </a>
						</div>
					</div>
					<div id="highlightPreview"
						class="card-body d-flex flex-column gap-2">
						<span class="fs-7 text-gray-400">불러오는 중...</span>
					</div>
				</div>

				<!--수정 버튼-->
				<button type="button"
					onclick="location.href='/diary/edit/' + diaryId"
					class="btn btn-light-primary w-100">
					<i class="ki-duotone ki-pencil fs-4"> <span class="path1"></span>
						<span class="path2"></span>
					</i> 수정하기
				</button>

				<!--삭제 버튼-->
				<button type="button" onclick="handleDelete()"
					class="btn btn-light-danger w-100">
					<i class="ki-duotone ki-trash fs-4"> <span class="path1"></span>
						<span class="path2"></span> <span class="path3"></span> <span
						class="path4"></span> <span class="path5"></span>
					</i> 삭제하기
				</button>

			</div>
		</div>
		<!--end::Content-->

		<!--begin::Bottom Navigation-->
		<div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>
		<!--end::Bottom Navigation-->

	</div>

	<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
	<script th:src="@{/js/scripts.bundle.js}"></script>

	<script>
        // URL에서 diaryId 꺼내기
        const diaryId = location.pathname.split('/').pop();

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                const [key, val] = c.trim().split('=');
                if (key === 'token') return val;
            }
            return null;
        }

        // 상세 데이터 조회
        document.addEventListener('DOMContentLoaded', function() {
            const token = getToken();
            if (!token) {
                location.href = '/publishing/login';
                return;
            }

            fetch(`/api/diary/${diaryId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(res => {
                if (!res.result) {
                    Swal.fire({
                        text: res.message,
                        icon: "error",
                        buttonsStyling: false,
                        confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-primary" }
                    }).then(() => history.back());
                    return;
                }

                const d = res.data;

                // 책 정보
                document.getElementById('bookImage').src = d.imageUrl || 'https://picsum.photos/80/110';
                document.getElementById('bookTitle').textContent = d.title;
                document.getElementById('bookAuthor').textContent =
                    d.author + (d.publisher ? ' · ' + d.publisher : '');
                document.getElementById('bookCategory').textContent = d.category || '';

                // 상태 뱃지
                const statusBadge = document.getElementById('statusBadge');
                if (d.status === 'READING') {
                    statusBadge.className = 'badge badge-sm badge-light-primary';
                    statusBadge.textContent = '📖 읽는 중';
                } else if (d.status === 'DONE') {
                    statusBadge.className = 'badge badge-sm badge-light-success';
                    statusBadge.textContent = '✅ 완독';
                } else {
                    statusBadge.className = 'badge badge-sm badge-light-secondary';
                    statusBadge.textContent = '🔖 읽고 싶어요';
                }

                // 독서 기간
                document.getElementById('startDate').textContent = d.startDate || '-';
                document.getElementById('endDate').textContent = d.endDate || '-';

                // 별점
                const ratingStars = document.getElementById('ratingStars');
                const ratingText = document.getElementById('ratingText');
                if (d.rating) {
                    ratingText.textContent = d.rating;
                    for (let i = 1; i <= 5; i++) {
                        const star = document.createElement('div');
                        star.className = 'rating-label' + (i <= d.rating ? ' checked' : '');
                        star.innerHTML = '<i class="ki-duotone ki-star fs-5"></i>';
                        ratingStars.appendChild(star);
                    }
                } else {
                    ratingText.textContent = '별점 없음';
                }

                // 메모
                if (d.memoTitle || d.memoContent) {
                    document.getElementById('memoTitle').textContent = d.memoTitle || '';
                    document.getElementById('memoContent').textContent = d.memoContent || '';
                } else {
                    document.getElementById('memoCard').style.display = 'none';
                }
            });
        });

        // 삭제
        function handleDelete() {
            Swal.fire({
                text: "정말 삭제하시겠습니까?",
                icon: "warning",
                buttonsStyling: false,
                showCancelButton: true,
                confirmButtonText: "삭제",
                cancelButtonText: "취소",
                customClass: {
                    confirmButton: "btn btn-danger",
                    cancelButton: "btn btn-light"
                }
            }).then(result => {
                if (result.isConfirmed) {
                    fetch(`/api/diary/${diaryId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + getToken() }
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.result) {
                            Swal.fire({
                                text: "삭제되었습니다.",
                                icon: "success",
                                buttonsStyling: false,
                                confirmButtonText: "확인",
                                customClass: { confirmButton: "btn btn-primary" }
                            }).then(() => {
                                location.href = '/diary/home';
                            });
                        }
                    });
                }
            });
                   
        }
        
     // 하이라이트 미리보기 (최대 2개)
        function loadHighlightPreview() {
        	document.getElementById('highlightLink').href = `/diary/highlight?diaryId=${diaryId}`;

            fetch(`/api/highlights?diaryId=${diaryId}`, {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            })
            .then(res => res.json())
            .then(res => {
                const preview = document.getElementById('highlightPreview');
                preview.innerHTML = '';

                if (!res.result || res.data.length === 0) {
                    preview.innerHTML = '<span class="fs-7 text-gray-400">저장된 대사가 없어요</span>';
                    return;
                }

                res.data.slice(0, 2).forEach(h => {
                    const item = document.createElement('div');
                    item.className = 'bg-light-primary rounded p-3';
                    item.innerHTML = `
                        ${h.pageNumber ? `<span class="fs-9 text-gray-400">p. ${h.pageNumber}</span>` : ''}
                        <p class="fs-7 text-gray-700 mb-0">"${h.highlightText}"</p>
                    `;
                    preview.appendChild(item);
                });
            });
        }
    </script>

</body>
</html>
