<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>하이라이트 추가</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700">
<link th:href="@{/plugins/global/plugins.bundle.css}" rel="stylesheet">
<link th:href="@{/css/style.bundle.css}" rel="stylesheet">
</head>

<body>
    <div class="d-flex flex-column flex-root" style="height: 100vh;">

        <div th:replace="~{fragments/header :: header-back('하이라이트 추가')}"></div>

        <div class="d-flex flex-column-fluid overflow-auto">
            <div class="p-4 w-100 d-flex flex-column gap-4">

                <!--책 선택-->
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h3 class="card-title fs-6">책 선택</h3>
                    </div>
                    <div class="card-body d-flex flex-column gap-3">

                        <!--검색란-->
                        <div class="position-relative">
                            <input type="text" id="searchInput"
                                   class="form-control form-control-lg pe-10"
                                   placeholder="책 제목으로 내 서재 검색"
                                   oninput="handleSearch(this.value)">
                            <span class="position-absolute top-50 end-0 translate-middle-y pe-3">
                                <i class="ki-duotone ki-magnifier fs-3 text-gray-400">
                                    <span class="path1"></span>
                                    <span class="path2"></span>
                                </i>
                            </span>
                        </div>

                        <!--검색 결과-->
                        <div id="searchResults" class="d-flex flex-column gap-2" style="display:none;"></div>

                        <!--선택된 책-->
                        <div id="selectedBookCard" class="d-flex gap-3 align-items-center d-none">
                            <img id="selectedImage" src="" class="rounded"
                                 style="width: 40px; height: 55px; object-fit: cover;">
                            <div class="d-flex flex-column gap-1 flex-grow-1">
                                <span id="selectedTitle" class="fw-semibold fs-7 text-gray-800"></span>
                                <span id="selectedAuthor" class="fs-8 text-gray-500"></span>
                            </div>
                            <button type="button" class="btn btn-sm btn-icon btn-light"
                                    onclick="clearSelectedBook()">
                                <i class="ki-duotone ki-cross fs-4">
                                    <span class="path1"></span>
                                    <span class="path2"></span>
                                </i>
                            </button>
                        </div>

                    </div>
                </div>

                <!--하이라이트 입력-->
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h3 class="card-title fs-6">대사 입력</h3>
                    </div>
                    <div class="card-body d-flex flex-column gap-3">
                        <div>
                            <label class="form-label fw-semibold text-gray-700 fs-7">페이지</label>
                            <input type="number" id="pageNumber" class="form-control"
                                   placeholder="페이지 번호 (선택)">
                        </div>
                        <div>
                            <label class="form-label fw-semibold text-gray-700 fs-7">
                                대사 <span class="text-danger">*</span>
                            </label>
                            <textarea id="highlightText" class="form-control" rows="4"
                                      placeholder="기억하고 싶은 문장을 입력하세요"></textarea>
                        </div>
                    </div>
                </div>

                <!--저장 버튼-->
                <button type="button" onclick="handleSave()"
                        class="btn btn-primary w-100 btn-lg">
                    저장하기
                </button>

            </div>
        </div>

    </div>

    <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
    <script th:src="@{/js/scripts.bundle.js}"></script>

    <script>
        let selectedDiaryId = null;
        let searchTimer = null;

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                const [key, val] = c.trim().split('=');
                if (key === 'token') return val;
            }
            return null;
        }

        // 내 서재에서 검색
        function handleSearch(keyword) {
            clearTimeout(searchTimer);
            const results = document.getElementById('searchResults');

            if (!keyword.trim()) {
                results.style.display = 'none';
                results.innerHTML = '';
                return;
            }

            searchTimer = setTimeout(() => {
                fetch(`/api/diary?keyword=${encodeURIComponent(keyword)}`, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                })
                .then(res => res.json())
                .then(res => {
                    results.style.display = 'flex';
                    results.innerHTML = '';

                    if (!res.result || res.data.length === 0) {
                        results.innerHTML = '<span class="fs-7 text-gray-400 text-center py-3">검색 결과가 없어요</span>';
                        return;
                    }

                    res.data.forEach(diary => {
                        const item = document.createElement('div');
                        item.className = 'card border';
                        item.style.cursor = 'pointer';
                        item.innerHTML = `
                            <div class="card-body py-3">
                                <div class="d-flex gap-3 align-items-center">
                                    <img src="${diary.imageUrl || 'https://picsum.photos/40/55'}"
                                         class="rounded"
                                         style="width: 40px; height: 55px; object-fit: cover;">
                                    <div class="d-flex flex-column gap-1">
                                        <span class="fw-semibold fs-7 text-gray-800">${diary.title}</span>
                                        <span class="fs-8 text-gray-500">${diary.author || ''}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        item.onclick = () => selectBook(diary);
                        results.appendChild(item);
                    });
                });
            }, 300);
        }

        function selectBook(diary) {
            selectedDiaryId = diary.diaryId;
            const results = document.getElementById('searchResults');
            results.innerHTML = '';
            results.style.display = 'none';
            document.getElementById('searchInput').value = diary.title;
            document.getElementById('selectedImage').src = diary.imageUrl || 'https://picsum.photos/40/55';
            document.getElementById('selectedTitle').textContent = diary.title;
            document.getElementById('selectedAuthor').textContent = diary.author || '';
            document.getElementById('selectedBookCard').classList.remove('d-none');
        }

        function clearSelectedBook() {
            selectedDiaryId = null;
            document.getElementById('searchInput').value = '';
            document.getElementById('selectedBookCard').classList.add('d-none');
        }

        function handleSave() {
            if (!selectedDiaryId) {
                Swal.fire({
                    text: "책을 먼저 선택해주세요.",
                    icon: "warning",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-primary" }
                });
                return;
            }

            const text = document.getElementById('highlightText').value;
            if (!text.trim()) {
                Swal.fire({
                    text: "대사를 입력해주세요.",
                    icon: "warning",
                    buttonsStyling: false,
                    confirmButtonText: "확인",
                    customClass: { confirmButton: "btn btn-primary" }
                });
                return;
            }

            fetch('/api/highlights', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + getToken()
                },
                body: JSON.stringify({
                    diaryId: selectedDiaryId,
                    pageNumber: document.getElementById('pageNumber').value || null,
                    highlightText: text
                })
            })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    Swal.fire({
                        text: "저장되었습니다!",
                        icon: "success",
                        buttonsStyling: false,
                        confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-primary" }
                    }).then(() => {
                        location.href = '/highlight/highlight';
                    });
                } else {
                    Swal.fire({
                        text: res.message,
                        icon: "error",
                        buttonsStyling: false,
                        confirmButtonText: "확인",
                        customClass: { confirmButton: "btn btn-danger" }
                    });
                }
            });
        }
    </script>

</body>
</html>
