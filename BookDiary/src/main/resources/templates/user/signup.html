<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('회원가입')}"></head>
<body>

<div th:replace="~{fragments/header :: header('회원가입')}"></div>

<div class="page-wrap">
    <div class="container">
        <form id="signupForm" class="mt-lg">
            <div class="card-lg">
                <div class="card-label">Join BookDiary</div>

                <div class="form-group">
                    <label class="form-label">아이디</label>
                    <input type="text" id="userId" name="userId" class="form-input" placeholder="사용할 아이디를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" id="pass" name="pass" class="form-input" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label">이름</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="이름을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="example@mail.com">
                </div>

                <button type="button" onclick="handleSignup()" class="btn btn-primary btn-full mt-md">가입 완료</button>
            </div>
        </form>
    </div>
</div>

<script>
    function handleSignup() {
        // 1. 데이터 수집
        const data = {
            userId: document.getElementById('userId').value,
            pass: document.getElementById('pass').value,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value
        };

        // 2. 유효성 검사 (간단하게)
        if (!data.userId || !data.pass || !data.name) {
            alert("필수 항목을 모두 입력해주세요.");
            return;
        }

        // 3. 서버로 JSON 전송
        fetch('/api/auth/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // 서버가 기대하는 형식
            },
            body: JSON.stringify(data)
        })
            .then(res => res.json())
            .then(res => {
                if (res.result) {
                    alert("회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.");
                    location.href = "/auth/login";
                } else {
                    alert("가입 실패: " + res.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("서버 통신 중 오류가 발생했습니다.");
            });
    }
</script>

</body>
</html>
